<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Forgot Password</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<!-- BACKGROUND ANIMATION -->

<div class="bg-animation">

    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>

</div>

<!-- FORGOT PASSWORD SECTION -->

<div class="page-center">

    <div class="glass-card login-card">

        <h1 class="login-title">

            Reset Password

        </h1>

        <p class="subtitle">

            Change your account password securely

        </p>

        <!-- FORM -->

        <form action="/forgot"
              method="POST">

            <!-- EMAIL -->

            <input
                type="email"
                name="email"
                placeholder="Enter Your Registered Email"
                required
            >

            <!-- NEW PASSWORD -->

            <input
                type="password"
                name="password"
                placeholder="Enter New Password"
                required
            >

            <!-- CONFIRM PASSWORD -->

            <input
                type="password"
                name="confirm_password"
                placeholder="Confirm New Password"
                required
            >

            <!-- BUTTON -->

            <button type="submit">

                Update Password

            </button>

        </form>

        <!-- LOGIN LINK -->

        <p class="signup-text">

            Remember your password?

            <a href="/login">

                Login Here

            </a>

        </p>

    </div>

</div>

</body>

</html>
