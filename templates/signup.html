<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Signup</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<!-- BACKGROUND ANIMATION -->

<div class="bg-animation">

    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>

</div>

<!-- SIGNUP SECTION -->

<div class="page-center">

    <div class="glass-card login-card">

        <h1 class="login-title">

            Create Account

        </h1>

        <p class="subtitle">

            Join AI Placement Prediction Portal

        </p>

        <!-- SIGNUP FORM -->

        <form action="/signup"
              method="POST">

            <!-- FULL NAME -->

            <input
                type="text"
                name="fullname"
                placeholder="Enter Full Name"
                required
            >

            <!-- EMAIL -->

            <input
                type="email"
                name="email"
                placeholder="Enter Email Address"
                required
            >

            <!-- REGISTER NUMBER -->

            <input
                type="text"
                name="regno"
                placeholder="Enter Register Number"
                required
            >

            <!-- PASSWORD -->

            <input
                type="password"
                name="password"
                placeholder="Create Password"
                required
            >

            <!-- CONFIRM PASSWORD -->

            <input
                type="password"
                name="confirm_password"
                placeholder="Confirm Password"
                required
            >

            <!-- BUTTON -->

            <button type="submit">

                Create Account

            </button>

        </form>

        <!-- LOGIN LINK -->

        <p class="signup-text">

            Already have an account?

            <a href="/login">

                Login

            </a>

        </p>

    </div>

</div>

</body>

</html>
